name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Linux amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o sub-store-linux-amd64 .

      - name: Build Linux arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o sub-store-linux-arm64 .

      - name: Build Darwin amd64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o sub-store-darwin-amd64 .

      - name: Build Darwin arm64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o sub-store-darwin-arm64 .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sub-store-linux-amd64
            sub-store-linux-arm64
            sub-store-darwin-amd64
            sub-store-darwin-arm64
          generate_release_notes: true
